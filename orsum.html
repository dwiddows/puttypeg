  <h1>
    Quantum Disjunction is &or; &Sigma;
  </h1>
  To model the logical disjunction (OR operator &or;), quantum logic uses the vector sum operation &Sigma;.

  So quantum disjuntion is literally OrSum. Isn't that &or; &Sigma;?

  <p>
  So far this bad pun has been used as a store name for some informative mug designs --- see
  <a href="https://www.zazzle.com/store/orsumdesigns/products">OrSum Designs</a>.
